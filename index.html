<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Dash Ultra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="960" height="540"></canvas>

    <div id="hud">
      <div class="row">
        <div class="pill">Progress: <span id="score">0</span>%</div>
        <div class="pill">Best: <span id="best">0</span>%</div>
        <div class="pill">Mode: <span id="mode">cube</span></div>
        <div class="pill">Level: <span id="levelName">Starter Path</span></div>
        <div class="pill">Coins: <span id="coins">0</span></div>
      </div>
      <div class="row">
        <button id="menuBtn">Menu</button>
        <button id="levelBtn">Levels</button>
        <button id="practiceBtn">Practice: Off</button>
        <button id="fsBtn">Fullscreen</button>
      </div>
      <div id="hint">
        Space / ↑ / Click = jump • hold in ship mode = fly up • P = pause • R = restart
      </div>
    </div>

    <div id="overlay">
      <div class="card">
        <h1 id="ovTitle">Mini Dash Ultra</h1>
        <p id="ovText">Pick a level and press start.</p>

        <div id="levelList"></div>

        <div class="overlayButtons">
          <button id="btn">Start</button>
          <button id="nextBtn" class="hidden">Next Level</button>
          <button id="menuOverlayBtn" class="hidden">Main Menu</button>
        </div>

        <small id="ovSmall">
          Features: ship mode, gravity flip, mini mode, speed portals, coins, checkpoints, practice mode.
        </small>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
