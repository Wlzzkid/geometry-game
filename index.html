<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Dash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="960" height="540"></canvas>

    <div id="ui">
      <div class="row">
        <div class="pill">Score: <span id="score">0</span></div>
        <div class="pill">Best: <span id="best">0</span></div>
        <div class="pill">Speed: <span id="spd">1.0</span>x</div>
      </div>
      <div id="hint">Press <b>Space</b>/<b>↑</b> or <b>Click</b> to jump • <b>R</b> restart</div>
    </div>

    <div id="overlay" class="hidden">
      <div class="card">
        <h1 id="ovTitle">Mini Dash</h1>
        <p id="ovText">Press Space / Click to start</p>
        <button id="btn">Start</button>
        <small>Tip: hold jump slightly early — there’s jump buffering.</small>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
